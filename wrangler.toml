name = "sticker-repo-matrix-worker"
type = "javascript"
workers_dev = true
route = ""
zone_id = ""
compatibility_date = "2026-06-05"
main = "src/worker.ts"

# Production environment with account ID from env var
[env.production]
account_id = "${CLOUDFLARE_ACCOUNT_ID}"
vars = { GITHUB_PAGES_URL = "https://sticker-repo.github.io" }

[build]
command = "npm run build"
cwd = "./"

[build.upload]
format = "service-worker"

[[build.upload.rules]]
type = "CompiledContentType"
globs = ["**/*.wasm"]
fallthrough = true
